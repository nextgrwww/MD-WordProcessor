<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Markdown Editor</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    
    <!-- Tailwind CSS for layout utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Toast UI Editor CSS -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/theme/toastui-editor-dark.min.css" />
    
    <!-- html2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --mac-window-bg: #ffffff;
            --mac-titlebar-bg: linear-gradient(to bottom, #f6f6f6, #d4d4d4);
            --mac-titlebar-border: #b1b1b1;
            --mac-text: #4d4d4d;
            --context-bg: #ffffff;
            --context-hover: #f3f4f6;
            --context-text: #374151;
            --context-border: #e5e7eb;
        }

        .dark-theme {
            --mac-window-bg: #1e1e1e;
            --mac-titlebar-bg: linear-gradient(to bottom, #333333, #222222);
            --mac-titlebar-border: #000000;
            --mac-text: #cccccc;
            --context-bg: #2d2d2d;
            --context-hover: #3d3d3d;
            --context-text: #e5e7eb;
            --context-border: #444444;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--mac-window-bg);
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .mac-window {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            background: var(--mac-window-bg);
            border-radius: 0px;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .mac-title {
            font-size: 13px;
            color: var(--mac-text);
            font-weight: 500;
            pointer-events: none;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .mac-toolbar-actions {
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        .mac-toolbar-actions button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--mac-text);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 6px;
            transition: background 0.2s, transform 0.1s;
        }

        .mac-toolbar-actions button:hover {
            background: rgba(128, 128, 128, 0.15);
        }
        
        .mac-toolbar-actions button:active {
            transform: scale(0.95);
        }

        #custom-context-menu {
            background-color: var(--context-bg);
            color: var(--context-text);
            border-color: var(--context-border);
        }
        
        .context-item {
            padding: 8px 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .context-item:hover {
            background-color: var(--context-hover);
        }

        #editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .toastui-editor-defaultUI {
            border: none !important;
            display: flex;
            flex-direction: column;
            height: 100% !important;
            background-color: var(--mac-window-bg);
        }

        .mac-toolbar-wrapper {
            background: var(--mac-titlebar-bg);
            border-bottom: 1px solid var(--mac-titlebar-border);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 52px;
            user-select: none;
            width: 100%;
            box-sizing: border-box;
        }

        .toastui-editor-toolbar {
            background: transparent !important;
            border: none !important;
            padding: 0 8px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: flex-start !important;
            flex-wrap: nowrap !important;
            min-height: auto !important;
            flex: 1;
            overflow-x: auto !important;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .toastui-editor-toolbar::-webkit-scrollbar {
            display: none;
        }
        
        body #editor-container .toastui-editor-defaultUI button[aria-label="More"] {
            display: none !important;
        }

        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar,
        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar div:not(.toastui-editor-toolbar-divider) {
            background: transparent !important;
            background-image: none !important;
            border: none !important;
            box-shadow: none !important;
        }

        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar-group,
        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar-item-wrapper {
            display: flex !important;
            align-items: center !important;
            height: auto !important;
            flex-shrink: 0 !important;
        }

        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar button {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            border-radius: 6px !important;
            margin: 0 2px !important;
            transition: background 0.2s, transform 0.1s;
        }

        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar button.toastui-editor-toolbar-icons {
            background-image: none !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
        }

        .ph {
            pointer-events: none;
            font-size: 18px;
            color: var(--mac-text);
        }

        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar button:hover {
            background: rgba(128, 128, 128, 0.15) !important;
        }

        body #editor-container .toastui-editor-defaultUI .toastui-editor-toolbar .toastui-editor-toolbar-divider {
            background-color: var(--mac-titlebar-border) !important;
            opacity: 0.5;
            height: 20px !important;
            margin: 0 6px !important;
            width: 1px !important;
            display: inline-block !important;
            flex-shrink: 0 !important;
        }

        .toastui-editor-contents {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
            font-size: 15px !important;
            padding: 2rem !important;
        }

        @media (max-width: 640px) {
            .mac-window { width: 95vw; height: 95vh; }
            .toastui-editor-contents { padding: 1rem !important; }
        }
    </style>
</head>
<body>

    <div id="custom-context-menu" class="hidden absolute shadow-2xl rounded-lg border text-sm py-1 z-50 min-w-[160px] transition-opacity duration-200"></div>

    <div id="mac-ui-template" style="display: none;">
        <div class="mac-left-ui flex items-center gap-4 mr-4 flex-shrink-0">
            <div class="mac-title hidden md:flex items-center">
                <i class="ph-fill ph-file-text text-[16px] mr-1"></i> Document.md
            </div>
        </div>
        <div class="mac-toolbar-actions ml-4 flex-shrink-0">
            <button onclick="toggleTheme()" title="Toggle Dark/Light Mode" id="theme-btn"><i class="ph ph-moon"></i></button>
            <button onclick="loadFile()" title="Load Markdown File"><i class="ph ph-folder-open"></i></button>
            <button onclick="saveFile()" title="Save as Markdown"><i class="ph ph-floppy-disk"></i></button>
            <button onclick="savePDF()" title="Export to PDF"><i class="ph ph-file-pdf"></i></button>
        </div>
    </div>

    <div class="mac-window">
        <div id="editor-container">
            <div id="editor"></div>
        </div>
    </div>

    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    
    <script>
        const OriginalResizeObserver = window.ResizeObserver;
        window.ResizeObserver = class ResizeObserver extends OriginalResizeObserver {
            constructor(callback) {
                super((entries, observer) => {
                    window.requestAnimationFrame(() => {
                        if (!Array.isArray(entries) || !entries.length) return;
                        try { callback(entries, observer); } catch (e) {}
                    });
                });
            }
        };

        const editor = new toastui.Editor({
            el: document.querySelector('#editor'),
            height: '100%',
            initialEditType: 'wysiwyg',
            previewStyle: 'vertical',
            initialValue: "# Welcome to macOS Markdown 📝",
            useCommandShortcut: true,
            toolbarItems: [
                ['heading', 'bold', 'italic', 'strike'],
                ['hr', 'quote'],
                ['ul', 'ol', 'task', 'indent', 'outdent'],
                ['table', 'image', 'link'],
                ['code', 'codeBlock']
            ]
        });

        const toolbar = document.querySelector('.toastui-editor-toolbar');
        const wrapper = document.createElement('div');
        wrapper.className = 'mac-toolbar-wrapper';
        toolbar.parentNode.insertBefore(wrapper, toolbar);
        
        const template = document.getElementById('mac-ui-template');
        wrapper.appendChild(template.querySelector('.mac-left-ui'));
        wrapper.appendChild(toolbar);
        wrapper.appendChild(template.querySelector('.mac-toolbar-actions'));

        const phosphorIcons = {
            'Heading': 'ph-text-h', 'Bold': 'ph-text-b', 'Italic': 'ph-text-italic',
            'Strike': 'ph-text-strikethrough', 'Line': 'ph-minus', 'Blockquote': 'ph-quotes',
            'Unordered list': 'ph-list-bullets', 'Ordered list': 'ph-list-numbers',
            'Task': 'ph-check-square', 'Indent': 'ph-text-indent', 'Outdent': 'ph-text-outdent',
            'Insert table': 'ph-table', 'Insert image': 'ph-image', 'Insert link': 'ph-link',
            'Code': 'ph-code', 'Code block': 'ph-file-code'
        };

        function injectAll() {
            Object.keys(phosphorIcons).forEach(label => {
                const btn = document.querySelector(`button[aria-label="${label}"]`);
                if (btn && !btn.querySelector('.ph')) {
                    btn.innerHTML = `<i class="ph ${phosphorIcons[label]}"></i>`;
                    btn.title = label;
                }
            });
            
            const toolbar = document.querySelector('.toastui-editor-toolbar');
            if (toolbar && !document.querySelector('.custom-edit-group')) {
                const createBtn = (label, icon, onClick) => {
                    const btn = document.createElement('button');
                    btn.className = 'toastui-editor-toolbar-icons custom-btn';
                    btn.setAttribute('aria-label', label);
                    btn.title = label;
                    btn.innerHTML = `<i class="ph ${icon}"></i>`;
                    btn.addEventListener('click', onClick);
                    return btn;
                };
                
                const editGroup = document.createElement('div');
                editGroup.className = 'toastui-editor-toolbar-group custom-edit-group';
                editGroup.appendChild(createBtn('Undo', 'ph-arrow-u-up-left', () => document.execCommand('undo')));
                editGroup.appendChild(createBtn('Redo', 'ph-arrow-u-up-right', () => document.execCommand('redo')));
                editGroup.appendChild(createBtn('Cut', 'ph-scissors', () => document.execCommand('cut')));
                editGroup.appendChild(createBtn('Copy', 'ph-copy', () => document.execCommand('copy')));
                
                const moveGroup = document.createElement('div');
                moveGroup.className = 'toastui-editor-toolbar-group custom-move-group';
                moveGroup.appendChild(createBtn('Move Up', 'ph-arrow-up', moveUp));
                moveGroup.appendChild(createBtn('Move Down', 'ph-arrow-down', moveDown));

                toolbar.appendChild(editGroup);
                toolbar.appendChild(moveGroup);
            }
        }

        function moveUp() {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const block = getClosestBlockNode(sel.anchorNode);
            if (block && block.previousElementSibling) {
                block.parentNode.insertBefore(block, block.previousElementSibling);
            }
        }

        function moveDown() {
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const block = getClosestBlockNode(sel.anchorNode);
            if (block && block.nextElementSibling) {
                block.parentNode.insertBefore(block.nextElementSibling, block);
            }
        }

        function getClosestBlockNode(node) {
            if (!node) return null;
            if (node.nodeType === 3) node = node.parentNode;
            while (node && node.parentNode) {
                if (node.parentNode.classList && node.parentNode.classList.contains('ProseMirror')) return node;
                node = node.parentNode;
            }
            return null;
        }

        requestAnimationFrame(() => injectAll());
        new MutationObserver(() => injectAll()).observe(document.querySelector('.toastui-editor-toolbar'), { childList: true, subtree: true });

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            document.querySelector('.toastui-editor-defaultUI').classList.toggle('toastui-editor-dark');
            document.querySelector('#theme-btn').innerHTML = document.body.classList.contains('dark-theme') ? '<i class="ph ph-sun"></i>' : '<i class="ph ph-moon"></i>';
        }

        function saveFile() {
            const blob = new Blob([editor.getMarkdown()], { type: 'text/markdown' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'document.md'; a.click();
        }

        function loadFile() {
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => editor.setMarkdown(event.target.result);
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        function savePDF() {
            html2pdf().from(document.querySelector('.toastui-editor-contents')).save('document.pdf');
        }
    </script>
</body>
</html>
